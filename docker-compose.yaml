version: "3"
services:
  geoserver:
    build:
      context: .
      args:
        - GS_VERSION=2.28.2
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      # ── GeoServer General ───────────────────────────────
      - INSTALL_EXTENSIONS=${INSTALL_EXTENSIONS}
      - STABLE_EXTENSIONS=${STABLE_EXTENSIONS}
      - COMMUNITY_EXTENSIONS=${COMMUNITY_EXTENSIONS}
      - EXTRA_JAVA_OPTS=${EXTRA_JAVA_OPTS}

      # ── CORS ────────────────────────────────────────────
      - CORS_ENABLED=${CORS_ENABLED}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CORS_ALLOWED_METHODS=${CORS_ALLOWED_METHODS}
      - CORS_ALLOWED_HEADERS=${CORS_ALLOWED_HEADERS}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS}

      # ── PostgreSQL ───────────────────────────────────────
      - POSTGRES_JNDI_ENABLED=${POSTGRES_JNDI_ENABLED}
      - POSTGRES_JNDI_RESOURCE_NAME=${POSTGRES_JNDI_RESOURCE_NAME}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USERNAME=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # ── User/Permission ──────────────────────────────────
      - RUN_UNPRIVILEGED=${RUN_UNPRIVILEGED}
      - RUN_WITH_USER_UID=${RUN_WITH_USER_UID}
      - RUN_WITH_USER_GID=${RUN_WITH_USER_GID}

      # ── GeoServer S3 Plugin (MinIO) ──────────────────────
      - S3_ALIAS=${S3_ALIAS}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_USER=${S3_USER}
      - S3_PASS=${S3_PASS}

      # ── AWS SDK (MinIO endpoint override) ───────────────
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - AWS_S3_ADDRESSING_STYLE=${AWS_S3_ADDRESSING_STYLE}
      - AWS_HTTPS=${AWS_HTTPS}
      - AWS_VIRTUAL_HOSTING=${AWS_VIRTUAL_HOSTING}

      # ── imageio-ext COG S3 Range Reader ─────────────────
      - IIO_S3_AWS_USER=${IIO_S3_AWS_USER}
      - IIO_S3_AWS_PASSWORD=${IIO_S3_AWS_PASSWORD}
      - IIO_S3_AWS_REGION=${IIO_S3_AWS_REGION}
      - IIO_S3_AWS_ENDPOINT=${IIO_S3_AWS_ENDPOINT}
      - IIO_S3_AWS_CORE_POOL_SIZE=${IIO_S3_AWS_CORE_POOL_SIZE}
      - IIO_S3_AWS_MAX_POOL_SIZE=${IIO_S3_AWS_MAX_POOL_SIZE}
      - IIO_S3_AWS_KEEP_ALIVE_TIME=${IIO_S3_AWS_KEEP_ALIVE_TIME}

    volumes:
      - ./geoserver_data:/opt/geoserver_data/:Z
      - ./additional_libs:/opt/additional_libs:Z # by mounting this we can install libs from host on startup
      - ./additional_fonts:/opt/additional_fonts:Z
    healthcheck:
      test: curl --fail "http://localhost:8080/geoserver/web/wicket/resource/org.geoserver.web.GeoServerBasePage/img/logo.png" || exit 1
      interval: 1m
      retries: 3
      timeout: 20s
  postgis:
    image: postgis/postgis:18-3.6-alpine
    ports:
      - "5555:5432"
    environment:
      POSTGRES_USER: geoserver
      POSTGRES_PASSWORD: geoserver
    volumes:
      - ./postgis/postgresql_data:/var/lib/postgresql:Z
    healthcheck:
      test: pg_isready -U geoserver -h localhost -t 5 || exit 1
      interval: 10s
      retries: 5
      timeout: 10s
